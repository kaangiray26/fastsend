<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🌠 FastSend</title>
        <style>
            html {
                margin: 0;
                padding: 0;
            }
            body {
                margin: 0;
                padding: 1rem;
                box-sizing: border-box;
                font-family: sans-serif;
            }
            pre {
                white-space: pre-wrap;
                word-break: break-word;
                user-select: all;
                background: #f0f0f0;
                width: fit-content;
                padding: 0.5rem 1rem;
                border-radius: 0.25rem;
            }
        </style>
    </head>
    <body>
        <div>
            <h1>🌠 FastSend</h1>
            <pre>{{ text }}</pre>
            <p>
                Click the text above to select it. You can then copy it to your
                clipboard.
            </p>
        </div>
    </body>
</html>
